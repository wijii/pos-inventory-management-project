<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Settings</title>
  <link rel="stylesheet" href="../assets/css/navigationbar.css">
  <link rel="stylesheet" href="../assets/css/topbar.css">
  <link rel="stylesheet" href="../assets/css/settings.css">
  <style>
    /* Fix: override body flex from settings.css so container handles layout */
    body {
      display: block;
    }
  </style>
</head>

<body>
  <div id="page-overlay"></div>
  <div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="logo">
        <h2>Manager</h2>
        <p>Loading...</p>
      </div>

      <ul>
        <li>
          <a href="dashboard.html" class="link">
            <i data-lucide="layout-dashboard"></i>
            Dashboard
          </a>
        </li>
        <li>
          <a href="pos.html" class="link">
            <i data-lucide="shopping-cart"></i>
            POS
          </a>
        </li>
        <li>
          <a href="products.html" class="link">
            <i data-lucide="box"></i>
            Products
          </a>
        </li>
        <li>
          <a href="inventory.html" class="link">
            <i data-lucide="layers"></i>
            Inventory
          </a>
        </li>
        <li>
          <a href="sales.html" class="link">
            <i data-lucide="receipt"></i>
            Sales
          </a>
        </li>
        <li>
          <a href="staff.html" class="link">
            <i data-lucide="users"></i>
            Staff
          </a>
        </li>
        <li class="active">
          <a href="settings.html" class="link">
            <i data-lucide="settings"></i>
            Settings
          </a>
        </li>
      </ul>
      
    </div>

    

    <!-- MAIN CONTENT -->
    <div class="main">

      <!-- TOPBAR -->
      <div class="topbar">
        <div class="topbars">
          <h3>SETTINGS</h3>
        </div>
        <a href="#" class="logout" onclick="openModal('logoutModal')">
          <i data-lucide="log-out"></i> Logout
        </a>
      </div>

      <!-- LOGGED IN AS -->


      <!-- ACCOUNT SETTINGS -->
      <div class="card">
        <h3>Account Settings</h3>
        <hr>
        <div class="account-flex">
          <div class="avatar">
            <img src="../assets/svgs/CafeLogo.svg" alt="Casa Cafe" class="avatar-img" />
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="fullname" placeholder="Enter full name">
            </div>

            <div class="form-group">
              <label>Username</label>
              <input type="text" id="username" placeholder="Enter username">
            </div>

            <div class="form-group">
              <label>Email</label>
              <input type="text" id="email" placeholder="Enter email">
            </div>

            <div class="form-group">
              <label>New Password</label>
              <input type="password" id="password" placeholder="Enter password">
            </div>
          </div>
        </div>

        <div class="btnpos">
          <button class="button" id="saveAccount">Save Changes</button>
        </div>
      </div>

      <!-- STORE + TAX ROW -->
      <div class="row">

        <!-- STORE SETTINGS -->
        <div class="card">
          <h3>Store Settings</h3>
          <hr>

          <div class="form-group">
            <label>Store Name</label>
            <input type="text" id="storeName" value="Jhonas Store">
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="text" id="storeEmail" value="caraanjhonas@gmail.com">
          </div>

          <div class="form-group">
            <label>Contact Number</label>
            <input type="text" id="contactNumber" value="09324213711">
          </div>

          <div class="btnpos">
            <button class="button" id="saveStore">Save Store Info</button>
          </div>
        </div>

        <!-- TAX & ALERTS -->
        <div class="card tax-card">
          <h3>Tax & Alerts</h3>
          <hr>

          <div class="form-group">
            <label>Tax Rate (%)</label>
            <input class="small-input" type="number" id="taxRate" value="5">
          </div>

          <div class="form-group">
            <label>Low Stock Alert</label>
            <input class="small-input" type="number" id="stockAlert" value="5">
          </div>

          <div class="btnpos">
            <button class="button" id="saveTax">Save</button>
          </div>
        </div>

      </div>

    </div><!-- end .main -->

  </div><!-- end .container -->

  <!--LOGOUT MODAL-->
    <div class="modal" id="logoutModal">
    <div class="modal-content">
      <h2>Logout</h2>
      <p>Are you sure you want to logout?</p>

    <div class="modal-buttons">
      <button onclick="closeModal('logoutModal')" class="cancelBtn">Cancel</button>
      <button class="deleteBtn" onclick="confirmLogout()">Logout</button>
    </div>
  </div>
</div>

  <script src="../assets/js/jquery-3.7.1.min.js"></script>
  <script src="../services/authAjax.js"></script>
  <script src="../controllers/navigationbar.js"></script>
  <script src="../assets/js/lucide.min.js"></script>
  <script src="../controllers/settings.js"></script>
  <script>lucide.createIcons();</script>

  <div id="alertsContainer"></div>
  <script>
    const authOverlay = document.getElementById('page-overlay');
    if (authOverlay) authOverlay.style.display = 'block';
    if (typeof authAjax !== 'undefined') {
        authAjax.getSession(function (data) {
            if (data.role !== 'Manager' && data.role !== 'Admin') {
                alert('Access Denied. Manager only.');
                window.location.href = 'login.html';
            } else if (authOverlay) authOverlay.style.display = 'none';
        }, function () {
            window.location.href = 'login.html';
        });
    }
  </script>
</body>

</html>
