<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Staff Management</title>
  <link rel="stylesheet" href="../assets/css/navigationbar.css?v=5">
  <link rel="stylesheet" href="../assets/css/topbar.css">
  <link rel="stylesheet" href="../assets/css/staff.css">
</head>
<body>

  <div id="page-overlay"></div>

  <div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="logo">
        <h2>Manager</h2>
        <p>Loading...</p>
      </div>
      <ul>
        <li>
          <a href="dashboard.html" class="link">
            <i data-lucide="layout-dashboard"></i>
            Dashboard
          </a>
        </li>
        <li>
          <a href="pos.html" class="link">
            <i data-lucide="shopping-cart"></i>
            POS
          </a>
        </li>
        <li>
          <a href="products.html" class="link">
            <i data-lucide="box"></i>
            Products
          </a>
        </li>
        <li>
          <a href="inventory.html" class="link">
            <i data-lucide="layers"></i>
            Inventory
          </a>
        </li>
        <li>
          <a href="sales.html" class="link">
            <i data-lucide="receipt"></i>
            Sales
          </a>
        </li>
        <li>
          <a href="staff.html" class="link">
            <i data-lucide="users"></i>
            Staff
          </a>
        </li>
        <li>
          <a href="settings.html" class="link">
            <i data-lucide="settings"></i>
            Settings
          </a>
        </li>
      </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

      <!-- TOPBAR -->
      <div class="topbar">
        <div class="topbars"><h3>STAFF</h3></div>
        <div class="logout" onclick="openModal('logoutModal')">
          <i data-lucide="log-out"></i> Logout
        </div>
      </div>

      <!-- ACTION ROW -->
      <div class="action-row">
        <div class="searchbtn">
          <input type="text" id="search" placeholder="Search by name or id">
        </div>
        <button class="addBtn">+ Add Staff</button>
      </div>

      <div class="staff-grid" id="staffGrid">
        <!-- Staff cards will be injected here -->
      </div>

    </div>
  </div>

  <!-- ADD STAFF MODAL -->
  <div class="modal" id="addStaffModal">
    <div class="modal-content">
      <h2>Add Staff Member</h2>
      <form id="addStaffForm" novalidate>
        <div class="cppw">
          <input type="text" name="firstname" required placeholder="First Name">
          <input type="text" name="lastname" required placeholder="Last Name">
        </div>
        <div class="cppw">
          <input type="text" name="username" required placeholder="Username">
          <select name="role" required>
            <option value="" disabled selected hidden>Select Role</option>
            <option value="Manager">Manager</option>
            <option value="Cashier">Cashier</option>
          </select>
        </div>
        <div class="cppw">
          <input type="email" name="email" required placeholder="Email">
          <input type="tel" name="phone" required placeholder="Phone No." minlength="7" maxlength="15" oninput="this.value = this.value.replace(/[^0-9]/g, '')" onpaste="setTimeout(() => { this.value = this.value.replace(/[^0-9]/g, '') }, 0)">
        </div>
        <input type="password" name="password" required placeholder="Password">
        <hr>
        <div class="modal-buttons">
          <button type="button" class="cancelBtn">Cancel</button>
          <button type="submit" class="confirmBtn">Confirm</button>
        </div>
      </form>
    </div>
  </div>

  <!-- DELETE STAFF MODAL -->
  <div class="modal" id="deleteModal">
    <div class="modal-content">
      <h2>Delete Staff Member</h2>
      <p class="smol">Please enter the manager password to continue.</p>
      <div class="password-field">
        <input type="password" id="managerPassword" placeholder="Enter manager password">
        <button type="button" id="togglePassword">
          <i data-lucide="eye"></i>
        </button>
      </div>
      <div class="modal-buttons">
        <button type="button" class="cancelDeleteBtn">Cancel</button>
        <button type="button" class="confirmDeleteBtn">Verify &amp; Delete</button>
      </div>
    </div>
  </div>

  <!-- LOGOUT MODAL -->
  <div class="modal" id="logoutModal">
    <div class="modal-content">
      <h2>Logout</h2>
      <p>Are you sure you want to logout?</p>
      <div class="modal-buttons2">
        <button onclick="closeModal('logoutModal')" class="cancelBtn">Cancel</button>
        <button class="logoutBtn" onclick="confirmLogout()">Logout</button>
      </div>
    </div>
  </div>

  <div id="alertsContainer"></div>

  <!-- SCRIPTS: lucide MUST come before navigationbar.js so icons render correctly -->
  <script src="../assets/js/lucide.min.js"></script>
  <script src="../assets/js/jquery-3.7.1.min.js"></script>
  <script src="../services/authAjax.js"></script>
  <script src="../controllers/navigationbar.js"></script>
  <script src="../services/staffAjax.js"></script>
  <script src="../controllers/staff.js"></script>
  <script>lucide.createIcons();</script>

</body>
</html>
