    <!-- MAIN -->
    <main class="main">
      <!-- TOPBAR: Contains Title and Logout -->
      <div class="topbar">
          <h3 class="page-title">STAFF</h3>
          <div class="logout" onclick="openModal('logoutModal')">
              <i data-lucide="log-out"></i> Logout
          </div>
      </div>

      <!-- ACTION ROW: Contains Search and Add Button below the Topbar -->
      <div class="action-row">
          <div class="searchbtn">
              <input type="text" id="search" placeholder="Search by name or id">
          </div>
          <button class="addBtn">+ Add Staff</button>
      </div>

      <div class="staff-grid" id="staffGrid">
          <!-- Staff cards will be injected here -->
      </div>
    </main>

</div>

<!-- ADD STAFF MODAL -->
<div class="modal" id="addStaffModal">
  <div class="modal-content">
    <h2>Add Staff Member</h2>
    <form id="addStaffForm" novalidate>

      <!-- Role -->
      <select name="roleID" required>
      <option value="1">Manager</option>
      <option value="2">Cashier</option>
      </select>

      <!-- Username -->
      <input type="text" name="username" required placeholder="Username">

      <!-- Password -->
      <input type="password" name="password" required placeholder="Password">

      <!-- First Name -->
      <input type="text" name="firstName" required placeholder="First Name">

      <!-- Last Name -->
      <input type="text" name="lastName" required placeholder="Last Name">

      <!-- Email & Phone -->
      <div class="cppw">
        <input type="email" name="emailAddress" required placeholder="Email">
        <input type="text" name="phoneNo" required placeholder="Phone No.">
      </div>

      <!-- Working Status -->
      <select name="workingStatus" required>
        <option value="" disabled selected hidden>Select Status</option>
        <option value="Active">Active</option>
        <option value="Inactive">Inactive</option>
      </select>

      <!-- Manager Password (authorization only) -->
      <input type="password" name="managerPassword" required placeholder="Manager Password">

      <hr>
      <div class="modal-buttons">
        <button type="button" class="cancelBtn">Cancel</button>
        <button type="submit" class="confirmBtn">Confirm</button>
      </div>
    </form>
  </div>
</div>

<div class="modal" id="deleteModal">
  <div class="modal-content">
    <h2>Delete Staff Member</h2>
    <p class="smol">Please enter the manager password to continue.</p>

    <div class="password-field">
        <input type="password" id="managerPassword" placeholder="Enter manager password">
        <button type="button" id="togglePassword">
            <i data-lucide="eye"></i>
        </button>
    </div>

    <div class="modal-buttons">
      <button type="button" class="cancelDeleteBtn">Cancel</button>
      <button type="button" class="confirmDeleteBtn">Verify & Delete</button>
    </div>
  </div>
</div>

<!--LOGOUT MODAL-->
    <div class="modal" id="logoutModal">
    <div class="modal-content">
      <h2>Logout</h2>
      <p>Are you sure you want to logout?</p>

    <div class="modal-buttons2">
      <button onclick="closeModal('logoutModal')" class="cancelBtn">Cancel</button>
      <button class="logoutBtn" onclick="confirmLogout()">Logout</button>
    </div>
  </div>
</div>

  <script src="../assets/js/jquery-3.7.1.min.js"></script>
  <script src="../services/authAjax.js"></script>
  <script src="../controllers/navigationbar.js"></script>
<script src="../assets/js/lucide.min.js"></script> 
<script src="../controllers/staff.js"></script>

<div id="alertsContainer"></div>
  <script>
    const authOverlay = document.getElementById('page-overlay');
    if (authOverlay) authOverlay.style.display = 'block';
    if (typeof authAjax !== 'undefined') {
        authAjax.getSession(function (data) {
            if (data.role !== 'Manager' && data.role !== 'Admin') {
                alert('Access Denied. Manager only.');
                window.location.href = 'login.html';
            } else if (authOverlay) authOverlay.style.display = 'none';
        }, function () {
            window.location.href = 'login.html';
        });
    }
  </script>
